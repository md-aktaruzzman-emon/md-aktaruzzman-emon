<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="100%">
  <defs>
    <!-- Background Gradient: Deep Indigo-Purple to Dark Slate -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09050d" />
      <stop offset="50%" stop-color="#120c1a" />
      <stop offset="100%" stop-color="#060409" />
    </linearGradient>

    <!-- Glowing Purple Radial Gradient for the Cyber Graphic -->
    <radialGradient id="glowRadial" cx="75%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8458B3" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#8458B3" stop-opacity="0" />
    </radialGradient>

    <!-- Accent Gradient: Ice Cold Blue to Purple Pain -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A0D2EB" />
      <stop offset="50%" stop-color="#D0BDF4" />
      <stop offset="100%" stop-color="#8458B3" />
    </linearGradient>

    <!-- Grid Pattern (Freeze Purple opacity) -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#E5EAF5" stroke-opacity="0.015" stroke-width="1"/>
    </pattern>

    <!-- Drop Shadow Filter for Terminal Window -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Accent Glow Filter (Purple Pain glow) -->
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect width="850" height="260" fill="url(#bgGrad)" rx="10" />
  
  <!-- Cyber Glow Background (Right Side) -->
  <rect width="850" height="260" fill="url(#glowRadial)" rx="10" />
  
  <!-- Technical Grid Overlay -->
  <rect width="850" height="260" fill="url(#grid)" rx="10" />

  <!-- Abstract Tech/Cybersecurity Graphic (Right Side) -->
  <g transform="translate(640, 130)">
    <!-- Circuit lines & nodes (Heavy Purple / Medium Purple mix) -->
    <g stroke="#A28089" stroke-width="1" stroke-opacity="0.25" fill="none">
      <path d="M -80 0 L -120 -40 L -180 -40" />
      <path d="M -80 30 L -100 50 L -140 50" />
      <path d="M -50 -65 L -70 -95 L -120 -95" />
      <path d="M 50 65 L 70 95 L 120 95" />
      <path d="M 80 0 L 120 40 L 180 40" />
    </g>
    <!-- Circuit node dots (Ice Cold & Purple Pain) -->
    <circle cx="-180" cy="-40" r="3" fill="#A0D2EB" fill-opacity="0.7" />
    <circle cx="-140" cy="50" r="3" fill="#8458B3" fill-opacity="0.7" />
    <circle cx="-120" cy="-95" r="3" fill="#A0D2EB" fill-opacity="0.7" />
    <circle cx="120" cy="95" r="3" fill="#8458B3" fill-opacity="0.7" />
    <circle cx="180" cy="40" r="3" fill="#A0D2EB" fill-opacity="0.7" />

    <!-- Outer Tech Rings -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="#D0BDF4" stroke-opacity="0.1" stroke-width="1" />
    <circle cx="0" cy="0" r="80" fill="none" stroke="url(#accentGrad)" stroke-opacity="0.3" stroke-dasharray="100 40 20 40" stroke-width="1.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="68" fill="none" stroke="#8458B3" stroke-opacity="0.2" stroke-dasharray="10 15" stroke-width="1" />

    <!-- Center Icon: Cybersecurity Shield with AE Monogram -->
    <path d="M-24,-28 L24,-28 L24,-4 C24,12 0,28 0,28 C0,28 -24,12 -24,-4 Z" 
          fill="#0c0714" fill-opacity="0.95" stroke="url(#accentGrad)" stroke-width="2.5" filter="url(#purpleGlow)" />
    
    <!-- Code symbol inside shield -->
    <text x="0" y="6" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15" font-weight="bold" fill="#A0D2EB" text-anchor="middle">&lt;AE/&gt;</text>
  </g>

  <!-- Left Side: Interactive Terminal Window -->
  <g transform="translate(35, 30)" filter="url(#shadow)">
    <!-- Terminal Box (Heavy Purple stroke for border depth) -->
    <rect width="460" height="200" fill="#0c0714" rx="8" stroke="#A28089" stroke-width="1.2" stroke-opacity="0.6" />
    
    <!-- Terminal Header / Titlebar -->
    <path d="M 0 8 A 8 8 0 0 1 8 0 L 452 0 A 8 8 0 0 1 460 8 L 460 32 L 0 32 Z" fill="#140d20" />
    <line x1="0" y1="32" x2="460" y2="32" stroke="#A28089" stroke-width="1.2" stroke-opacity="0.3" />
    
    <!-- Titlebar Window controls (Red, Yellow, Green dots) -->
    <circle cx="16" cy="16" r="5" fill="#ff5f56" />
    <circle cx="32" cy="16" r="5" fill="#ffbd2e" />
    <circle cx="48" cy="16" r="5" fill="#27c93f" />
    
    <!-- Terminal Tab Title (Heavy Purple) -->
    <text x="230" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#A28089" text-anchor="middle" letter-spacing="1">bash • profile.sh</text>

    <!-- Terminal Output Text -->
    <g transform="translate(20, 62)">
      <!-- Command prompt (Ice Cold & Freeze Purple) -->
      <text x="0" y="0" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="13" fill="#A0D2EB" font-weight="bold">
        guest@emon-desktop:~$ <tspan fill="#E5EAF5">whoami</tspan>
      </text>
      
      <!-- Main Name (Gradient Accent) -->
      <text x="0" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="800" fill="url(#accentGrad)" letter-spacing="0.5">
        Md. Aktaruzzman Emon
      </text>
      
      <!-- Subtitle (Medium Purple) -->
      <text x="0" y="60" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13.5" font-weight="600" fill="#D0BDF4" letter-spacing="0.5">
        CSE Undergraduate | Systems | Defensive Security
      </text>

      <!-- Bullet info with custom prompt characters (Ice Cold / Freeze Purple) -->
      <text x="0" y="94" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="12" fill="#E5EAF5">
        <tspan fill="#A0D2EB" font-weight="bold">❯</tspan> systems::C_C++_development
      </text>
      <text x="0" y="114" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="12" fill="#E5EAF5">
        <tspan fill="#A0D2EB" font-weight="bold">❯</tspan> security::packet_analysis_labs
      </text>
      
      <!-- Blinking Cursor (Ice Cold) -->
      <rect x="250" y="103" width="8" height="13" fill="#A0D2EB" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>
