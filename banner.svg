<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070f" />
      <stop offset="40%" stop-color="#0b132b" />
      <stop offset="80%" stop-color="#1c1a27" />
      <stop offset="100%" stop-color="#020408" />
    </linearGradient>

    <!-- Glowing Accent Gradients -->
    <linearGradient id="primary-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#a18cd1" />
    </linearGradient>

    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="accent-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd200" />
      <stop offset="100%" stop-color="#f7971e" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="dot-grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#475569" opacity="0.35" />
    </pattern>

    <!-- Filters -->
    <filter id="glow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Layer -->
  <rect width="100%" height="100%" fill="url(#bg-gradient)" />
  <rect width="100%" height="100%" fill="url(#dot-grid)" />

  <!-- Abstract Tech Grid Lines & Circles -->
  <g stroke="url(#primary-glow)" stroke-width="1" fill="none" opacity="0.25">
    <!-- Center circular radar / tech circles -->
    <circle cx="425" cy="160" r="140" stroke-dasharray="5, 10" />
    <circle cx="425" cy="160" r="110" />
    <circle cx="425" cy="160" r="80" stroke-dasharray="3, 3" />
    
    <!-- Tech lines radiating outward -->
    <line x1="0" y1="160" x2="280" y2="160" stroke-width="1.5" />
    <line x1="570" y1="160" x2="850" y2="160" stroke-width="1.5" />
    
    <!-- Circuit lines on bottom left -->
    <path d="M 50,250 L 150,250 L 180,220 L 250,220" />
    <circle cx="250" cy="220" r="3" fill="#00f2fe" />
    
    <!-- Circuit lines on top right -->
    <path d="M 800,70 L 700,70 L 670,100 L 600,100" />
    <circle cx="600" cy="100" r="3" fill="#a18cd1" />
  </g>

  <!-- Background Ambient Glow behind text -->
  <circle cx="425" cy="160" r="130" fill="#4facfe" opacity="0.12" filter="url(#glow-heavy)" />
  
  <!-- Side bracket accents for code aesthetic -->
  <text x="140" y="180" font-family="'Courier New', Courier, monospace" font-size="64" fill="#00f2fe" opacity="0.25" font-weight="900" filter="url(#glow-soft)">&lt;</text>
  <text x="660" y="180" font-family="'Courier New', Courier, monospace" font-size="64" fill="#a18cd1" opacity="0.25" font-weight="900" filter="url(#glow-soft)">&gt;</text>

  <!-- Main Title -->
  <text x="425" y="135" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="900" font-size="38" fill="url(#primary-glow)" letter-spacing="6" filter="url(#glow-soft)">
    MD. AKTARUZZMAN EMON
  </text>

  <!-- Horizontal divider line -->
  <line x1="260" y1="160" x2="590" y2="160" stroke="url(#primary-glow)" stroke-width="2.5" opacity="0.85" filter="url(#glow-soft)" />

  <!-- Subtitle -->
  <text x="425" y="195" text-anchor="middle" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-weight="700" font-size="12.5" fill="#94a3b8" letter-spacing="4">
    SYSTEMS ENGINEERING  •  ETHICAL HACKING  •  PYTHON AUTOMATION
  </text>

  <!-- Mini Tech Stack Badges at the bottom -->
  <g transform="translate(295, 235)" opacity="0.8">
    <!-- C/C++ Glowing Shield Emblem -->
    <g transform="translate(0, 0)">
      <polygon points="12,2 2,6 2,14 12,20 22,14 22,6" fill="none" stroke="#4facfe" stroke-width="1.5" filter="url(#glow-soft)" />
      <text x="12" y="13" font-family="sans-serif" font-size="7" font-weight="bold" fill="#00f2fe" text-anchor="middle">C++</text>
    </g>

    <!-- Python Glowing Shield Emblem -->
    <g transform="translate(90, 0)">
      <polygon points="12,2 2,6 2,14 12,20 22,14 22,6" fill="none" stroke="#ffd200" stroke-width="1.5" filter="url(#glow-soft)" />
      <text x="12" y="13" font-family="sans-serif" font-size="7" font-weight="bold" fill="#f7971e" text-anchor="middle">PY</text>
    </g>

    <!-- Cybersecurity Shield Emblem -->
    <g transform="translate(180, 0)">
      <polygon points="12,2 2,6 2,14 12,20 22,14 22,6" fill="none" stroke="#a18cd1" stroke-width="1.5" filter="url(#glow-soft)" />
      <path d="M12,5 L17,8 L17,12 C17,15 15,17 12,18 C9,17 7,15 7,12 L7,8 Z" fill="#a18cd1" opacity="0.7" />
    </g>

    <!-- Databases / SQL Shield Emblem -->
    <g transform="translate(250, 0)">
      <polygon points="12,2 2,6 2,14 12,20 22,14 22,6" fill="none" stroke="#00f2fe" stroke-width="1.5" filter="url(#glow-soft)" />
      <text x="12" y="13" font-family="sans-serif" font-size="7" font-weight="bold" fill="#00f2fe" text-anchor="middle">SQL</text>
    </g>
  </g>
</svg>
